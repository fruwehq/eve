# Copy this file to config/catalog.local.yaml for machine-local customizations.
# This file is ignored by git.
#
# Notes:
# - Entries merge by logical keys:
#   machines.name, oses.id, inits.id, packages.id, bundles.id, locations.name
# - Matching entries are replaced/updated.
# - New entries are appended.
# - Replace <provider> below with a provider id contributed by an installed
#   provider plugin (e.g. one pulled via `eve pull`). Core ships no providers.

locations:
  - name: tokyo
    <provider>:
      availability_zone: ap-northeast-1c

machines:
  - name: <provider>-cheap-x86
    defaults:
      disk_gb: 60
