# Plugin sources (v4.2: agnostic core ships NO default plugins).
#
# Core deliberately bundles no providers/packages — adding a default here would
# re-introduce the coupling v4.0/v4.1 removed. This committed file stays empty.
#
# Add sources with the CLI (writes the user override at `.eve/plugin-sources.yaml`,
# which is merged on top of this file; a source id in the override wins):
#   eve plugin source recommended              # see the curated first-party list
#   eve plugin source add --recommended eve-providers
#   eve plugin source add https://github.com/you/your-plugins.git --ref v1.0.0
# or manage them in the TUI's plugin screen. Then `eve pull` to materialize.
#
# Local development against sibling checkouts (no remote needed):
#   eve plugin source add ../eve-providers --id eve-providers --ref main --auth none
sources: []
