# v2 catalog
# Single source of truth for machine composition:
# machine + os + init + packages/bundles + location + profile
version: 1

# -----------------------------------------------------------------------------
# Reusable YAML anchors (to reduce repetition)
# -----------------------------------------------------------------------------
x-local-medium: &local_medium
  cpus: 4
  memory_mb: 8192
  disk_gb: 100

x-local-qemu-medium: &local_qemu_medium
  cpus: 2
  memory_mb: 4096
  # QEMU/cloud-image boxes start with a small root disk. The full local dev
  # desktop smoke stack needs more room than the default image provides, but
  # should stay modest enough not to starve the host.
  disk_gb: 64

x-ttl-default: &ttl_default
  ttl_hours: 168
  reminder_hours: [24, 6, 1]
  on_expiry: stop_then_destroy
  grace_hours: 24

# -----------------------------------------------------------------------------
# Machine catalog (provider/runtime layer)
# -----------------------------------------------------------------------------
machines:
  - name: aws-cheap-x86
    provider: aws
    kind: vm
    defaults:
      instance_type: t3.large
      disk_gb: 80
      root_volume_type: gp3

  - name: aws-gpu-g5
    provider: aws
    kind: vm
    defaults:
      instance_type: g5.2xlarge
      disk_gb: 200

  - name: vultr-vcg-a40-1c # 1 vCPU, 5 GB RAM, 90 GB NVMe, 3 TB/mo, $0.075/hr, 1/24 NVIDIA A40 (2 GB VRAM)
    provider: vultr
    kind: vm
    defaults:
      plan: vcg-a40-1c-5g-2vram

  - name: vultr-vcg-a40-2c # 2 vCPUs, 10 GB RAM, 180 GB NVMe, 4 TB/mo, $0.144/hr, 1/12 NVIDIA A40 (4 GB VRAM)
    provider: vultr
    kind: vm
    defaults:
      plan: vcg-a40-2c-10g-4vram

  - name: vultr-vcg-a40-4c # 4 vCPUs, 20 GB RAM, 360 GB NVMe, 5 TB/mo, $0.288/hr, 1/6 NVIDIA A40 (8 GB VRAM)
    provider: vultr
    kind: vm
    defaults:
      plan: vcg-a40-4c-20g-8vram

  - name: vultr-vcg-a40-6c # 6 vCPUs, 30 GB RAM, 550 GB NVMe, 6 TB/mo, $0.432/hr, 1/4 NVIDIA A40 (12 GB VRAM)
    provider: vultr
    kind: vm
    defaults:
      plan: vcg-a40-6c-30g-12vram

  - name: local-virtualbox-medium
    provider: local-virtualbox
    kind: vm
    defaults: *local_medium

  - name: local-qemu-medium
    provider: local-qemu
    kind: vm
    defaults: *local_qemu_medium

  - name: local-vmware-medium
    provider: local-vmware
    kind: vm
    defaults: *local_medium

  - name: raspberry-pi-5
    provider: raspberry-pi
    kind: metal
    defaults:
      # CPU / memory / disk are physical attributes of the Pi, not knobs this
      # repo can set. Only architecture is recorded so provisioning can pick
      # arm64 binaries.
      architecture: arm64

  - name: truenas-scale-medium
    provider: truenas
    kind: vm
    defaults:
      cpu_cores: 4
      cpu_mode: HOST-PASSTHROUGH
      # TrueNAS `vcpus` is socket count, while `cpu_cores` is cores per socket.
      # Keep the default topology at 1 socket * 4 cores so QEMU/KVM exposes 4
      # CPUs instead of the previous 2 * 4 = 8 CPU topology.
      vcpus: 1
      memory_mb: 8192
      disk_gb: 30
      network: br0
      autostart: true
      state: RUNNING

# -----------------------------------------------------------------------------
# OS catalog (explicit image/version/flavor)
# -----------------------------------------------------------------------------
oses:
  - id: ubuntu-26.04-amd64
    family: ubuntu
    version: "26.04"
    arch: amd64
    vagrant_box: cloud-image/ubuntu-26.04
    cloud_image_url: https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-amd64.img

  - id: ubuntu-26.04-arm64
    family: ubuntu
    version: "26.04"
    arch: arm64
    vagrant_box: cloud-image/ubuntu-26.04

  - id: windows-server-2025
    family: windows
    version: "2025"
    arch: amd64
    ui_mode: desktop
    vultr_os_id: 2514 # Windows 2025 Standard x64

# -----------------------------------------------------------------------------
# Init catalog (first-boot access + baseline hardening)
# -----------------------------------------------------------------------------
inits:
  - id: ssh-ubuntu-cloud-init
    os_family: ubuntu
    features: [ssh, hardening, nonroot-user]

  - id: ssh-ubuntu-metal
    os_family: ubuntu
    features: [ssh, hardening]

  - id: ssh-windows-powershell7
    os_family: windows
    features: [ssh, hardening]

  - id: ssm-aws-linux
    os_family: ubuntu
    provider: aws
    features: [ssm, ssh-optional]

# -----------------------------------------------------------------------------
# Workload package catalog
# -----------------------------------------------------------------------------
packages:
  - id: claude
  - id: codex-cli
  - id: dev-toolchain
  - id: docker
  - id: gnome-desktop
  - id: goose
  - id: hermes
  - id: macos-desktop-theme
  - id: opencode
  - id: rdp
  - id: rustdesk
  - id: ssh
  - id: steam
  - id: sunshine
  - id: vscode
  - id: vnc
  - id: xpra

# -----------------------------------------------------------------------------
# Bundle catalog (composable package groups)
# -----------------------------------------------------------------------------
bundles:
  - id: access-headless
    includes: [ssh]

  - id: access-gui-safe
    includes: [ssh, rustdesk, vnc]

  - id: access-gui-gnome
    includes: [ssh, gnome-desktop, rustdesk]

  - id: access-gui-gnome-mac
    includes: [ssh, gnome-desktop, macos-desktop-theme, rustdesk]

  - id: access-gui-vnc
    includes: [ssh, vnc]

  - id: access-gui-streaming
    includes: [ssh, sunshine, rustdesk]

  - id: remote-apps
    includes: [ssh, xpra]

  - id: dev-sandbox-core
    includes: [docker, dev-toolchain, goose, claude, codex-cli, hermes, opencode, vscode]

  - id: dev-sandbox-core-arm64
    # goose currently does not publish a Linux aarch64 archive, so ARM local/Pi
    # environments use the rest of the AI/dev tooling until upstream support
    # exists.
    includes: [docker, dev-toolchain, claude, codex-cli, hermes, opencode, vscode]

  - id: gaming-core
    includes: [sunshine, steam, rustdesk]

# -----------------------------------------------------------------------------
# Location mapping (provider-specific region/AZ translation)
# -----------------------------------------------------------------------------
locations:
  - name: tokyo
    aws:
      region: ap-northeast-1
      availability_zone: ap-northeast-1b
    vultr:
      region: nrt
    local-virtualbox:
      host: local
    local-qemu:
      host: local
    local-vmware:
      host: local
    raspberry-pi:
      # Host comes from RASPBERRY_PI_HOST env var (required at runtime).
      ssh_port: 22
    truenas:
      # Canonical TrueNAS endpoint for this catalog.
      # Override in .env.local (TRUENAS_HOST) if needed.
      host: truenas.home.arpa
      ssh_port: 22
      # ssh_user comes from TRUENAS_SSH_USER (required at runtime).
      # Used by module defaults if machine.network is omitted
      bridge: br0
      pool: main

# -----------------------------------------------------------------------------
# Recipe catalog (composition entries)
# -----------------------------------------------------------------------------
recipes:
  - name: aws-ubuntu-dev-headless
    machine: aws-cheap-x86
    os: ubuntu-26.04-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo
    lifecycle: *ttl_default

  - name: aws-ubuntu-dev-gui
    machine: aws-cheap-x86
    os: ubuntu-26.04-amd64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-safe, dev-sandbox-core]
    location: tokyo

  - name: vultr-windows-gaming
    machine: vultr-vcg-a40-2c
    os: windows-server-2025
    init: ssh-windows-powershell7
    bundles: [access-gui-streaming, gaming-core]
    location: tokyo

  - name: local-vbox-ubuntu-dev
    machine: local-virtualbox-medium
    os: ubuntu-26.04-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo

  - name: local-vbox-ubuntu-all
    machine: local-virtualbox-medium
    os: ubuntu-26.04-amd64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core]
    location: tokyo

  - name: local-qemu-ubuntu-dev-gui
    machine: local-qemu-medium
    os: ubuntu-26.04-arm64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-safe, dev-sandbox-core-arm64]
    location: tokyo

  - name: local-qemu-ubuntu-all
    machine: local-qemu-medium
    os: ubuntu-26.04-arm64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core-arm64, gaming-core]
    location: tokyo

  - name: local-vmware-ubuntu-dev-gui
    machine: local-vmware-medium
    os: ubuntu-26.04-amd64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-safe, dev-sandbox-core]
    location: tokyo

  - name: local-vmware-ubuntu-all
    machine: local-vmware-medium
    os: ubuntu-26.04-amd64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core]
    location: tokyo

  - name: truenas-ubuntu-dev-headless
    machine: truenas-scale-medium
    os: ubuntu-26.04-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo
    lifecycle: *ttl_default

  - name: truenas-ubuntu-all
    machine: truenas-scale-medium
    os: ubuntu-26.04-amd64
    ui_mode: desktop
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core]
    location: tokyo
    lifecycle: *ttl_default

  - name: rpi-ubuntu-all
    machine: raspberry-pi-5
    os: ubuntu-26.04-arm64
    ui_mode: desktop
    init: ssh-ubuntu-metal
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core-arm64, gaming-core]
    location: tokyo
