# v2 catalog
# Single source of truth for machine composition:
# machine + os + init + packages/bundles + location + profile
version: 1

# -----------------------------------------------------------------------------
# Reusable YAML anchors (to reduce repetition)
# -----------------------------------------------------------------------------
x-local-medium: &local_medium
  cpus: 4
  memory_mb: 8192
  disk_gb: 100

x-ttl-default: &ttl_default
  ttl_hours: 168
  reminder_hours: [24, 6, 1]
  on_expiry: stop_then_destroy
  grace_hours: 24

# -----------------------------------------------------------------------------
# Machine catalog (provider/runtime layer)
# -----------------------------------------------------------------------------
machines:
  - name: aws-cheap-x86
    provider: aws
    kind: vm
    defaults:
      instance_type: t3.large
      disk_gb: 80
      root_volume_type: gp3

  - name: aws-gpu-g5
    provider: aws
    kind: vm
    defaults:
      instance_type: g5.2xlarge
      disk_gb: 200

  - name: vultr-vcg-a40
    provider: vultr
    kind: vm
    defaults:
      plan: vcg-a40-2c-10g-4vram

  - name: local-virtualbox-medium
    provider: local-virtualbox
    kind: vm
    defaults: *local_medium

  - name: local-vmware-medium
    provider: local-vmware
    kind: vm
    defaults: *local_medium

  - name: truenas-scale-medium
    provider: truenas
    kind: vm
    defaults:
      cpu_cores: 4
      vcpus: 1
      memory_mb: 8192
      disk_gb: 30
      network: br0
      autostart: true
      state: RUNNING

# -----------------------------------------------------------------------------
# OS catalog (explicit image/version/flavor)
# -----------------------------------------------------------------------------
oses:
  - id: ubuntu-24.04-server-amd64
    family: ubuntu
    version: "24.04"
    arch: amd64
    ui_mode: headless
    vagrant_box: bento/ubuntu-24.04
    # Vultr OS ID (from `vultr-cli os list`). Override in catalog.local.yaml if stale.
    vultr_os_id: 2284  # Ubuntu 24.04 LTS x64
    cloud_image_url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img

  - id: ubuntu-24.04-desktop-amd64
    family: ubuntu
    version: "24.04"
    arch: amd64
    ui_mode: desktop
    vagrant_box: bento/ubuntu-24.04
    vultr_os_id: 2284  # Ubuntu 24.04 LTS x64
    cloud_image_url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img

  - id: windows-server-2025
    family: windows
    version: "2025"
    arch: amd64
    ui_mode: desktop
    vultr_os_id: 2514  # Windows 2025 Standard x64

# -----------------------------------------------------------------------------
# Init catalog (first-boot access + baseline hardening)
# -----------------------------------------------------------------------------
inits:
  - id: ssh-ubuntu-cloud-init
    os_family: ubuntu
    features: [ssh, hardening, nonroot-user]

  - id: ssh-windows-powershell7
    os_family: windows
    features: [ssh, hardening]

  - id: ssm-aws-linux
    os_family: ubuntu
    provider: aws
    features: [ssm, ssh-optional]

# -----------------------------------------------------------------------------
# Workload package catalog
# -----------------------------------------------------------------------------
packages:
  - id: codex-cli
  - id: dev-toolchain
  - id: docker
  - id: goose
  - id: rdp
  - id: rustdesk
  - id: ssh
  - id: steam
  - id: sunshine
  - id: vnc
  - id: xpra

# -----------------------------------------------------------------------------
# Bundle catalog (composable package groups)
# -----------------------------------------------------------------------------
bundles:
  - id: access-headless
    includes: [ssh]

  - id: access-gui-safe
    includes: [ssh, rustdesk, vnc]

  - id: access-gui-vnc
    includes: [ssh, vnc]

  - id: access-gui-streaming
    includes: [ssh, sunshine, rustdesk]

  - id: remote-apps
    includes: [ssh, xpra]

  - id: dev-sandbox-core
    includes: [docker, dev-toolchain, goose, codex-cli]

  - id: gaming-core
    includes: [sunshine, steam, rustdesk]

# -----------------------------------------------------------------------------
# Location mapping (provider-specific region/AZ translation)
# -----------------------------------------------------------------------------
locations:
  - name: tokyo
    aws:
      region: ap-northeast-1
      availability_zone: ap-northeast-1b
    vultr:
      region: nrt
    local-virtualbox:
      host: local
    local-vmware:
      host: local
    truenas:
      # Canonical TrueNAS endpoint for this catalog.
      # Override in .env.local (TRUENAS_HOST) if needed.
      host: truenas.home.arpa
      ssh_port: 22
      ssh_user: terraform
      # Used by module defaults if machine.network is omitted
      bridge: br0
      pool: main

# -----------------------------------------------------------------------------
# Profile catalog (composition entries)
# -----------------------------------------------------------------------------
profiles:
  - name: aws-ubuntu-dev-headless
    machine: aws-cheap-x86
    os: ubuntu-24.04-server-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo
    lifecycle: *ttl_default

  - name: aws-ubuntu-dev-gui
    machine: aws-cheap-x86
    os: ubuntu-24.04-desktop-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-safe, dev-sandbox-core]
    location: tokyo

  - name: vultr-windows-gaming
    machine: vultr-vcg-a40
    os: windows-server-2025
    init: ssh-windows-powershell7
    bundles: [access-gui-streaming, gaming-core]
    location: tokyo

  - name: local-vbox-ubuntu-dev
    machine: local-virtualbox-medium
    os: ubuntu-24.04-server-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo

  - name: local-vbox-ubuntu-all
    machine: local-virtualbox-medium
    os: ubuntu-24.04-desktop-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core, remote-apps]
    location: tokyo

  - name: local-vmware-ubuntu-dev-gui
    machine: local-vmware-medium
    os: ubuntu-24.04-desktop-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-safe, dev-sandbox-core, remote-apps]
    location: tokyo


  - name: local-vmware-ubuntu-all
    machine: local-vmware-medium
    os: ubuntu-24.04-desktop-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core, remote-apps]
    location: tokyo
  - name: truenas-ubuntu-dev-headless
    machine: truenas-scale-medium
    os: ubuntu-24.04-server-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-headless, dev-sandbox-core]
    location: tokyo
    lifecycle: *ttl_default

  - name: truenas-ubuntu-all
    machine: truenas-scale-medium
    os: ubuntu-24.04-desktop-amd64
    init: ssh-ubuntu-cloud-init
    bundles: [access-gui-streaming, access-gui-safe, dev-sandbox-core, gaming-core, remote-apps]
    location: tokyo
    lifecycle: *ttl_default
