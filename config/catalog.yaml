# v2 catalog
# Central catalog: shared OS identity rows, inits, packages, and locations.
# Provider-owned rows (machines, provider-specific OS image fields) live in
# provider manifests under plugins/providers/*/eve-plugin.yaml.
# Bundle definitions live in package manifests under
# plugins/packages/*/eve-plugin.yaml.
# The aggregator (eve_sdk/catalog.py) reconstructs the effective catalog by
# unioning these contributions with this central file.
version: 1

# -----------------------------------------------------------------------------
# OS identity catalog (shared across providers)
# Provider-specific image fields merge onto these rows via the aggregator.
# -----------------------------------------------------------------------------
oses:
  - id: ubuntu-26.04-amd64
    family: ubuntu
    version: "26.04"
    arch: amd64

  - id: ubuntu-26.04-arm64
    family: ubuntu
    version: "26.04"
    arch: arm64

  - id: windows-server-2025
    family: windows
    version: "2025"
    arch: amd64

# -----------------------------------------------------------------------------
# Init catalog (first-boot access + baseline hardening)
# -----------------------------------------------------------------------------
inits:
  - id: ssh-ubuntu-cloud-init
    os_family: ubuntu
    providers: [aws, gcp, local-qemu, truenas]

  - id: ssh-ubuntu-metal
    os_family: ubuntu
    providers: [raspberry-pi]

  - id: ssh-windows-powershell7
    os_family: windows
    providers: [aws, vultr]

# -----------------------------------------------------------------------------
# Workload package catalog
# -----------------------------------------------------------------------------
packages:
  - id: claude
  - id: codex-cli
  - id: dev-toolchain
  - id: discord
  - id: docker
  - id: gnome-desktop
  - id: gnome-desktop-headless
  - id: goose
  - id: hermes
  - id: kde-desktop
  - id: kde-desktop-headless
  - id: macos-desktop-theme
  - id: nomachine
  - id: opencode
  - id: rdp
  - id: rustdesk
  - id: splashtop
  - id: steam
  - id: sunshine
  - id: thinlinc
  - id: vscode
  - id: vnc
  - id: waypipe
  - id: xfce-desktop
  - id: xfce-desktop-headless
  - id: xpra

# -----------------------------------------------------------------------------
# Location mapping (provider-specific region/AZ translation)
# -----------------------------------------------------------------------------
locations:
  - name: tokyo
    aws:
      region: ap-northeast-1
      availability_zone: ap-northeast-1b
    gcp:
      region: asia-northeast1
      zone: asia-northeast1-b
    vultr:
      region: nrt
    local-qemu:
      host: local
    raspberry-pi:
      # Host comes from RASPBERRY_PI_HOST env var (required at runtime).
      ssh_port: 22
    truenas:
      # Canonical TrueNAS endpoint for this catalog.
      # Override in .env.local (TRUENAS_HOST) if needed.
      host: truenas.home.arpa
      ssh_port: 22
      # ssh_user comes from TRUENAS_SSH_USER (required at runtime).
      # Used by module defaults if machine.network is omitted
      bridge: br0
      pool: main
      provision_user: eve-provision
