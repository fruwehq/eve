# Non-secret structured defaults. Empty values are ignored.
#
# Only TRUE-core sections live here — the ones no provider/package plugin owns
# (global, the shared display setting, the vagrant engine, the human/windows
# users, and moonlight until its launcher is extracted (v4.4 §8).
# Provider and package config fields, defaults, and validation come from each
# plugin's manifest config_schema, not from core.
#
# Personal overrides go in .eve/config.yaml (git-ignored).
# Secrets (API keys, passwords) go in .eve/secrets/<provider>.yaml.

display:
  fps:
  resolution:

global:
  my_ip:
  provision_user:
  ssh_public_key_file:
  timezone:
  vm_user_name:

human_user:
  password:

moonlight:
  bitrate_kbps:
  display_mode:
  video_codec:
  video_decoder:

vagrant:
  show_console:

windows:
  password:
