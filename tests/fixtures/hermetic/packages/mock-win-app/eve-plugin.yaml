api_version: eve.plugin/v1
kind: package
id: mock-win-app
display_name: Mock Windows App
commands:
  install:
    exec: commands/windows/install
    args:
    - mock-win-app
  status:
    exec: commands/windows/status
    args:
    - mock-win-app
  down:
    exec: commands/windows/down
    args:
    - mock-win-app
supports:
  os_families:
  - windows
down:
  destructive: false
env: []
install:
  windows:
    steps:
    - provision/windows/mock-win-app.ps1
