version: 1
instances:
  - name: mock-dev-a
    machine: mock-small
    os: mockos-1.0-arm64
    init: ssh-mockos-cloud-init
    location: mock-tokyo
    bundles: [mock-dev]
    overrides:
      disk_gb: 30
      memory_mb: 2048

  - name: mock-gpu-a
    machine: mock-gpu
    os: mockos-1.0-amd64
    init: ssh-mockos-cloud-init
    location: mock-tokyo
    bundles: [mock-dev]
    overrides:
      disk_gb: 80

  - name: mock-win-a
    machine: mock-small
    os: mockwin-1.0
    init: ssh-mockwin-powershell
    location: mock-tokyo
    bundles: [mock-gaming]
