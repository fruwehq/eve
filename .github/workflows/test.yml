name: test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize timing summary
        run: |
          printf 'EVE_CI_TIMINGS=%s/eve-ci-timings.tsv\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          : > "$RUNNER_TEMP/eve-ci-timings.tsv"

      - name: Install Terraform
        if: runner.os == 'Linux'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Install Terramate
        if: runner.os == 'Linux'
        env:
          TERRAMATE_VERSION: "0.17.0"
        run: |
          set -euo pipefail
          step_name="Install Terramate"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          case "$(uname -s)" in
            Darwin) tool_os=darwin ;;
            Linux) tool_os=linux ;;
            *) echo "unsupported OS for Terramate install: $(uname -s)" >&2; exit 2 ;;
          esac
          case "$(uname -m)" in
            arm64|aarch64) tool_arch=arm64 ;;
            x86_64|amd64) tool_arch=x86_64 ;;
            *) echo "unsupported architecture for Terramate install: $(uname -m)" >&2; exit 2 ;;
          esac
          curl -fsSLo "$RUNNER_TEMP/terramate.tar.gz" "https://github.com/terramate-io/terramate/releases/download/v${TERRAMATE_VERSION}/terramate_${TERRAMATE_VERSION}_${tool_os}_${tool_arch}.tar.gz"
          mkdir -p "$RUNNER_TEMP/terramate"
          tar -C "$RUNNER_TEMP/terramate" -xzf "$RUNNER_TEMP/terramate.tar.gz"
          find "$RUNNER_TEMP/terramate" -type f -name terramate -exec sudo install -m 0755 {} /usr/local/bin/terramate \; -quit
          terramate version

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Ubuntu packages
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          step_name="Install Ubuntu packages"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg jq openssh-client ripgrep shellcheck sshpass yq

      - name: Install macOS packages
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          step_name="Install macOS packages"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          brew install jq ripgrep shellcheck yq

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          step_name="Install Python dependencies"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          python -m pip install --upgrade poetry
          poetry install --no-interaction --no-root

      - name: Generate Terramate code
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          step_name="Generate Terramate code"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          terramate generate

      - name: Run provision runner smoke
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          step_name="Run provision runner smoke"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          poetry run ./scripts/test provision-runner

      - name: Run test suite
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          step_name="Run test suite"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          poetry run ./scripts/test

      # macOS is a host orchestrator target (BSD vs GNU coreutils, dscacheutil
      # vs getent, path/subprocess quirks). Run only the host-portability slice
      # — doctor host hints + the Python suite — not the full Linux suite.
      - name: Run macOS host-portability checks
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          step_name="Run macOS host-portability checks"
          start="$(date +%s)"
          finish_timing() {
            status="$?"
            end="$(date +%s)"
            printf '%s\t%s\t%s\n' "$step_name" "$((end - start))" "$status" >> "$EVE_CI_TIMINGS"
            exit "$status"
          }
          trap finish_timing EXIT
          poetry run ./scripts/test doctor python

      - name: Timing summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "### Timing summary"
            echo
            echo "| Step | Seconds | Exit |"
            echo "| --- | ---: | ---: |"
            if [ -s "$EVE_CI_TIMINGS" ]; then
              while IFS="$(printf '\t')" read -r step seconds status; do
                echo "| ${step} | ${seconds} | ${status} |"
              done < "$EVE_CI_TIMINGS"
            else
              echo "| no timed shell steps completed | 0 | 0 |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Cross-repo agnosticism guard. Deliberately NOT part of per-PR CI: the per-PR
  # `test` job stays decoupled (one-way dependency, synthetic fixtures only).
  # This job runs nightly + on demand, checking out the real sibling plugin repos
  # read-only and running the core-boundary lint with them sourced — so a leak of
  # a concrete provider/package/OS id that the synthetic-fixture lint can't see
  # (it only bans the ids it discovers) fails here. See docs/v4.4-roadmap.md §11.
  cross-repo-agnosticism:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout eve
        uses: actions/checkout@v5
        with:
          path: eve

      - name: Checkout sibling plugin repos (read-only, best-effort)
        env:
          # Optional PAT with read access to private sibling repos. Public repos
          # clone without it; private ones (e.g. eve-plugins-openwrt) are skipped
          # with a warning when it's unset (the default GITHUB_TOKEN is scoped to
          # eve only and cannot read other repos).
          CROSS_REPO_TOKEN: ${{ secrets.EVE_CROSS_REPO_TOKEN }}
        run: |
          set -uo pipefail
          auth=""
          [ -n "${CROSS_REPO_TOKEN:-}" ] && auth="x-access-token:${CROSS_REPO_TOKEN}@"
          for repo in eve-providers eve-packages-linux eve-packages-windows eve-plugins-ai eve-plugins-openwrt; do
            if git clone --depth 1 "https://${auth}github.com/fruwehq/${repo}.git" "plugins/${repo}" 2>/dev/null; then
              echo "cloned ${repo}"
            else
              echo "::warning::skipping ${repo} — clone failed (private without EVE_CROSS_REPO_TOKEN?); not covered by this run"
            fi
          done

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install eve
        working-directory: eve
        run: |
          set -euo pipefail
          python -m pip install --upgrade poetry
          poetry install --no-interaction --no-root

      - name: core-boundary lint with real plugins sourced
        working-directory: eve
        run: |
          set -euo pipefail
          roots=""
          for dir in "${GITHUB_WORKSPACE}"/plugins/*/; do
            [ -d "$dir" ] || continue
            roots="${roots:+$roots:}${dir%/}"
          done
          if [ -z "$roots" ]; then
            echo "::error::no sibling plugin repos were cloned — cannot run the guard"
            exit 1
          fi
          echo "sourcing: $roots"
          EVE_PLUGIN_ROOTS_EXCLUSIVE=1 EVE_PLUGIN_ROOTS="$roots" \
            poetry run ./scripts/test-core-boundary
