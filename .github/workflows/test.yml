name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # only used in PRs; don't use in default branches. This is used to identify the delta

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.17.0"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install shellcheck + jq + ripgrep
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq ripgrep

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Python dependencies
        run: |
          pipx install poetry
          poetry install --no-interaction --no-root

      - name: Generate Terramate code
        run: terramate generate

      - name: Run provision runner smoke
        run: make test.provision-runner

      - name: Run make test
        run: make test
