api_version: egame.plugin/v1
kind: provider
id: local-qemu
display_name: Local QEMU
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/up, args: [--plan]}
  up: {exec: commands/up}
  down: {exec: commands/down}
  start: {exec: commands/up}
  stop: {exec: commands/stop}
  status: {exec: ../_common/commands/status}
  ip: {exec: ../_common/commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  validate: {exec: ../_common/commands/validate-os, args: [all, Vagrant box, vagrant_box]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
supports:
  engines: [vagrant]
  kinds: [vm]
env: [VAGRANT_SHOW_CONSOLE]
