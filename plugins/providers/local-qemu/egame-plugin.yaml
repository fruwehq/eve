api_version: egame.plugin/v1
kind: provider
id: local-qemu
display_name: Local QEMU
commands:
  resolve: {exec: scripts/provider-plugin, args: [local-qemu, resolve]}
  init: {exec: scripts/provider-plugin, args: [local-qemu, init]}
  plan: {exec: scripts/provider-plugin, args: [local-qemu, plan]}
  up: {exec: scripts/provider-plugin, args: [local-qemu, up]}
  down: {exec: scripts/provider-plugin, args: [local-qemu, down]}
  start: {exec: scripts/provider-plugin, args: [local-qemu, start]}
  stop: {exec: scripts/provider-plugin, args: [local-qemu, stop]}
  status: {exec: scripts/provider-plugin, args: [local-qemu, status]}
  ip: {exec: scripts/provider-plugin, args: [local-qemu, ip]}
  ssh: {exec: scripts/provider-plugin, args: [local-qemu, ssh]}
supports:
  engines: [vagrant]
  kinds: [vm]
env: [VAGRANT_SHOW_CONSOLE]
