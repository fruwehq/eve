api_version: eve.plugin/v1
kind: provider
id: local-qemu
display_name: Local QEMU
commands:
  resolve: {exec: commands/local-qemu, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/local-qemu, args: [plan]}
  up: {exec: commands/local-qemu, args: [up]}
  down: {exec: commands/local-qemu, args: [down]}
  start: {exec: commands/local-qemu, args: [start]}
  stop: {exec: commands/local-qemu, args: [stop]}
  status: {exec: commands/local-qemu, args: [status]}
  ip: {exec: commands/local-qemu, args: [ip]}
  ssh: {exec: commands/local-qemu, args: [ssh]}
  validate: {exec: ../_common/commands/validate-os, args: [all, cloud image URL, cloud_image_url]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME, value: vagrant}
    provision_user: {env: VM_USER_NAME, value: vagrant}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
config_schema:
  config:
    show_console:
      type: boolean
      description: "Set to true to open the hypervisor console window."
supports:
  engines: [qemu]
  kinds: [vm]
env: []
