api_version: egame.plugin/v1
kind: provider
id: gcp
display_name: Google Cloud
commands:
  resolve: {exec: scripts/provider-plugin, args: [gcp, resolve]}
  init: {exec: scripts/provider-plugin, args: [gcp, init]}
  plan: {exec: scripts/provider-plugin, args: [gcp, plan]}
  up: {exec: scripts/provider-plugin, args: [gcp, up]}
  down: {exec: scripts/provider-plugin, args: [gcp, down]}
  start: {exec: scripts/provider-plugin, args: [gcp, start]}
  stop: {exec: scripts/provider-plugin, args: [gcp, stop]}
  status: {exec: scripts/provider-plugin, args: [gcp, status]}
  ip: {exec: scripts/provider-plugin, args: [gcp, ip]}
  ssh: {exec: scripts/provider-plugin, args: [gcp, ssh]}
supports:
  engines: [terraform]
  kinds: [vm]
env: [GOOGLE_CLOUD_PROJECT, GOOGLE_APPLICATION_CREDENTIALS, SSH_PUBLIC_KEY_FILE, MY_IP]
