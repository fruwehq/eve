api_version: egame.plugin/v1
kind: provider
id: gcp
display_name: Google Cloud
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: ../_terraform-common/commands/init}
  plan: {exec: ../_terraform-common/commands/plan}
  up: {exec: ../_terraform-common/commands/up}
  down: {exec: ../_terraform-common/commands/down}
  start: {exec: ../_common/commands/start}
  stop: {exec: ../_common/commands/stop}
  status: {exec: ../_common/commands/status}
  ip: {exec: ../_common/commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  login: {exec: commands/login}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
  - id: login
    label: GCP Login
    target: provider.login
    interactive: true
capabilities: [login]
supports:
  engines: [terraform]
  kinds: [vm]
env: [GOOGLE_CLOUD_PROJECT, GOOGLE_APPLICATION_CREDENTIALS, SSH_PUBLIC_KEY_FILE, MY_IP]
