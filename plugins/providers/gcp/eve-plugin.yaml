api_version: eve.plugin/v1
kind: provider
id: gcp
display_name: Google Cloud
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: ../_terraform-common/commands/init}
  plan: {exec: ../_terraform-common/commands/plan}
  up: {exec: ../_terraform-common/commands/up}
  down: {exec: ../_terraform-common/commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  login: {exec: commands/login}
  tf-env: {exec: commands/tf-env}
  validate: {exec: ../_common/commands/validate-os, args: [all, GCP image selector, gcp_image_project, gcp_image_family]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
  - id: login
    label: GCP Login
    target: provider.login
    interactive: true
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
capabilities: [login]
supports:
  engines: [terraform]
  kinds: [vm]
env: [GOOGLE_APPLICATION_CREDENTIALS, GOOGLE_CLOUD_PROJECT, MY_IP, SSH_PUBLIC_KEY_FILE]
