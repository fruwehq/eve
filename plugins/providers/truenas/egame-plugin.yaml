api_version: egame.plugin/v1
kind: provider
id: truenas
display_name: TrueNAS SCALE
commands:
  resolve: {exec: scripts/provider-plugin, args: [truenas, resolve]}
  init: {exec: scripts/provider-plugin, args: [truenas, init]}
  plan: {exec: scripts/provider-plugin, args: [truenas, plan]}
  up: {exec: scripts/provider-plugin, args: [truenas, up]}
  down: {exec: scripts/provider-plugin, args: [truenas, down]}
  start: {exec: scripts/provider-plugin, args: [truenas, start]}
  stop: {exec: scripts/provider-plugin, args: [truenas, stop]}
  status: {exec: scripts/provider-plugin, args: [truenas, status]}
  ip: {exec: scripts/provider-plugin, args: [truenas, ip]}
  ssh: {exec: scripts/provider-plugin, args: [truenas, ssh]}
supports:
  engines: [terraform]
  kinds: [vm]
env:
  - TRUENAS_HOST
  - TRUENAS_SSH_USER
  - TRUENAS_SSH_PORT
  - TRUENAS_SSH_PRIVATE_KEY_FILE
  - TRUENAS_SSH_HOST_KEY_FINGERPRINT
