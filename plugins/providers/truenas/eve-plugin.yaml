api_version: eve.plugin/v1
kind: provider
id: truenas
display_name: TrueNAS SCALE
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: ../_terraform-common/commands/init}
  plan: {exec: ../_terraform-common/commands/plan}
  up: {exec: ../_terraform-common/commands/up}
  down: {exec: ../_terraform-common/commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  host-ssh: {exec: commands/host-ssh}
  tf-env: {exec: commands/tf-env}
  validate: {exec: ../_common/commands/validate-os, args: [all, cloud image URL, cloud_image_url]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
  - id: host-ssh
    label: TrueNAS SSH
    target: provider.host-ssh
    interactive: true
access:
  ubuntu:
    bootstrap_user: {env: EVE_PROVISION_USER, location: provision_user}
    provision_user: {env: EVE_PROVISION_USER, location: provision_user}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
capabilities: [host-ssh]
config_schema:
  config:
    api_user:
      type: string
      description: "TrueNAS API username associated with the API key."
    host:
      type: host
      required: true
      description: "TrueNAS host used for SSH/API access."
    ssh_host_key_fingerprint:
      type: string
      description: "Expected TrueNAS SSH host key fingerprint for verification."
    ssh_port:
      type: integer
      description: "TrueNAS SSH port."
    ssh_user:
      type: string
      description: "TrueNAS SSH username."
    vm_base_dir:
      type: path
      description: "Base directory for VM files on the TrueNAS host."
    vm_pool:
      type: string
      description: "ZFS pool for VM zvols."
    vm_zvol_prefix:
      type: string
      description: "ZFS dataset path prefix for VM zvols below vm_pool."
  secrets:
    api_key:
      type: string
      description: "TrueNAS API key used by provider status checks and API-backed automation."
    ssh_private_key_file:
      type: path
      required: true
      description: "Private key used for SSH to TrueNAS."
supports:
  engines: [terraform]
  kinds: [vm]
env:
  - EVE_PROVISION_USER
  - TRUENAS_HOST
  - TRUENAS_SSH_HOST_KEY_FINGERPRINT
  - TRUENAS_SSH_PORT
  - TRUENAS_SSH_PRIVATE_KEY_FILE
  - TRUENAS_SSH_USER
