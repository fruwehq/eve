api_version: egame.plugin/v1
kind: provider
id: vultr
display_name: Vultr
commands:
  resolve: {exec: scripts/provider-plugin, args: [vultr, resolve]}
  init: {exec: scripts/provider-plugin, args: [vultr, init]}
  plan: {exec: scripts/provider-plugin, args: [vultr, plan]}
  up: {exec: scripts/provider-plugin, args: [vultr, up]}
  down: {exec: scripts/provider-plugin, args: [vultr, down]}
  start: {exec: scripts/provider-plugin, args: [vultr, start]}
  stop: {exec: scripts/provider-plugin, args: [vultr, stop]}
  status: {exec: scripts/provider-plugin, args: [vultr, status]}
  ip: {exec: scripts/provider-plugin, args: [vultr, ip]}
  ssh: {exec: scripts/provider-plugin, args: [vultr, ssh]}
supports:
  engines: [terraform]
  kinds: [vm]
env: [VULTR_API_KEY]
