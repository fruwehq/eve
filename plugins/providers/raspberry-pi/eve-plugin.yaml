api_version: eve.plugin/v1
kind: provider
id: raspberry-pi
display_name: Raspberry Pi Metal
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/plan}
  up: {exec: commands/up}
  down: {exec: commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: commands/ssh}
  validate: {exec: ../_common/commands/validate-os, args: [all, metal image, metal_image]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
capabilities: [needs-provider-ip]
supports:
  engines: [metal]
  kinds: [metal]
env: [RASPBERRY_PI_HOST, RASPBERRY_PI_IP, RASPBERRY_PI_USER_PASSWORD, VM_USER_NAME]
