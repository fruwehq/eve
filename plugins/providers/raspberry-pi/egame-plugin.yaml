api_version: egame.plugin/v1
kind: provider
id: raspberry-pi
display_name: Raspberry Pi Metal
commands:
  resolve: {exec: scripts/provider-plugin, args: [raspberry-pi, resolve]}
  init: {exec: scripts/provider-plugin, args: [raspberry-pi, init]}
  plan: {exec: scripts/provider-plugin, args: [raspberry-pi, plan]}
  up: {exec: scripts/provider-plugin, args: [raspberry-pi, up]}
  down: {exec: scripts/provider-plugin, args: [raspberry-pi, down]}
  start: {exec: scripts/provider-plugin, args: [raspberry-pi, start]}
  stop: {exec: scripts/provider-plugin, args: [raspberry-pi, stop]}
  status: {exec: scripts/provider-plugin, args: [raspberry-pi, status]}
  ip: {exec: scripts/provider-plugin, args: [raspberry-pi, ip]}
  ssh: {exec: scripts/provider-plugin, args: [raspberry-pi, ssh]}
supports:
  engines: [metal]
  kinds: [metal]
env: [RASPBERRY_PI_HOST, RASPBERRY_PI_IP, RASPBERRY_PI_USER_PASSWORD, VM_USER_NAME]
