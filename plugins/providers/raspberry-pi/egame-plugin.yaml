api_version: egame.plugin/v1
kind: provider
id: raspberry-pi
display_name: Raspberry Pi Metal
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/plan}
  up: {exec: commands/up}
  down: {exec: commands/down}
  start: {exec: ../_common/commands/start}
  stop: {exec: ../_common/commands/stop}
  status: {exec: ../_common/commands/status}
  ip: {exec: ../_common/commands/ip}
  ssh: {exec: ../_common/commands/ssh}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
capabilities: [needs-provider-ip]
supports:
  engines: [metal]
  kinds: [metal]
env: [RASPBERRY_PI_HOST, RASPBERRY_PI_IP, RASPBERRY_PI_USER_PASSWORD, VM_USER_NAME]
