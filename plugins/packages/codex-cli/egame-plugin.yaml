api_version: egame.plugin/v1
kind: package
id: codex-cli
display_name: Codex CLI
commands:
  install: {exec: scripts/package-plugin, args: [codex-cli, install]}
  status: {exec: scripts/package-plugin, args: [codex-cli, status]}
  down: {exec: scripts/package-plugin, args: [codex-cli, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [base.sh, timezone.sh, ../dev-toolchain/provision/ubuntu/dev-toolchain.sh, provision/ubuntu/codex-cli.sh]
    package_markers: [dev-toolchain, codex-cli]
