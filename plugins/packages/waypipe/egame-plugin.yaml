api_version: egame.plugin/v1
kind: package
id: waypipe
display_name: Waypipe
commands:
  install: {exec: scripts/package-plugin, args: [waypipe, install]}
  status: {exec: scripts/package-plugin, args: [waypipe, status]}
  down: {exec: scripts/package-plugin, args: [waypipe, down]}
supports: {os_families: [ubuntu], arches: [amd64, arm64]}
down: {destructive: true}
env: []
actions:
  - id: waypipe
    label: Waypipe
    target: waypipe.open
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/waypipe.sh]
