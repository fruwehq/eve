api_version: egame.plugin/v1
kind: package
id: vnc
display_name: TigerVNC
commands:
  install: {exec: scripts/package-plugin, args: [vnc, install]}
  status: {exec: scripts/package-plugin, args: [vnc, status]}
  down: {exec: scripts/package-plugin, args: [vnc, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
actions:
  - id: vnc
    label: VNC
    target: vnc.open
    prompt:
      title: Open VNC
      message: Choose the viewer for this VNC session.
      env: VNC_VIEWER
      choices:
        - value: auto
          label: Auto
          variant: primary
        - value: system
          label: macOS
        - value: tigervnc
          label: TigerVNC
install:
  ubuntu:
    steps: [00_base.sh, 05_timezone.sh, 46_vnc.sh]
