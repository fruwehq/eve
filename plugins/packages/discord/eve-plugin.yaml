api_version: eve.plugin/v1
kind: package
id: discord
display_name: Discord
commands:
  install: {exec: scripts/package-plugin, args: [discord, install]}
  status: {exec: scripts/package-plugin, args: [discord, status]}
  down: {exec: scripts/package-plugin, args: [discord, down]}
supports: {os_families: [ubuntu, windows], arches: [amd64]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/discord.sh]
  windows:
    steps: [provision/windows/discord.ps1]
    state_files: []
    fallback: false
