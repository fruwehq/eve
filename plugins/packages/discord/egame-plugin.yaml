api_version: egame.plugin/v1
kind: package
id: discord
display_name: Discord
commands:
  install: {exec: scripts/package-plugin, args: [discord, install]}
  status: {exec: scripts/package-plugin, args: [discord, status]}
  down: {exec: scripts/package-plugin, args: [discord, down]}
supports: {os_families: [ubuntu], arches: [amd64]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [00_base.sh, 05_timezone.sh, provision/ubuntu/71_discord.sh]
