api_version: egame.plugin/v1
kind: package
id: ssh
display_name: SSH Access
commands:
  install: {exec: scripts/package-plugin, args: [ssh, install]}
  status: {exec: scripts/package-plugin, args: [ssh, status]}
  down: {exec: scripts/package-plugin, args: [ssh, down]}
supports: {os_families: [ubuntu, windows]}
down: {destructive: false}
env: [SSH_PUBLIC_KEY_FILE]
