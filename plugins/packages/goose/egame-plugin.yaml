api_version: egame.plugin/v1
kind: package
id: goose
display_name: Goose
commands:
  install: {exec: scripts/package-plugin, args: [goose, install]}
  status: {exec: scripts/package-plugin, args: [goose, status]}
  down: {exec: scripts/package-plugin, args: [goose, down]}
supports: {os_families: [ubuntu], arches: [amd64, arm64]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [00_base.sh, 05_timezone.sh, provision/ubuntu/40_goose.sh]
