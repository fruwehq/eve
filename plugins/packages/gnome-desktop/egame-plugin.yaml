api_version: egame.plugin/v1
kind: package
id: gnome-desktop
display_name: GNOME Desktop
commands:
  install: {exec: scripts/package-plugin, args: [gnome-desktop, install]}
  status: {exec: scripts/package-plugin, args: [gnome-desktop, status]}
  down: {exec: scripts/package-plugin, args: [gnome-desktop, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [00_base.sh, 05_timezone.sh, provision/ubuntu/48_gnome_desktop.sh]
