api_version: egame.plugin/v1
kind: package
id: macos-desktop-theme
display_name: macOS-like GNOME Theme
commands:
  install: {exec: scripts/package-plugin, args: [macos-desktop-theme, install]}
  status: {exec: scripts/package-plugin, args: [macos-desktop-theme, status]}
  down: {exec: scripts/package-plugin, args: [macos-desktop-theme, down]}
supports: {os_families: [ubuntu], ui_modes: [desktop]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [00_base.sh, 05_timezone.sh, 48_gnome_desktop.sh, 49_macos_desktop_theme.sh]
    package_markers: [gnome-desktop, macos-desktop-theme]
