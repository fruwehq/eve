api_version: egame.plugin/v1
kind: package
id: sunshine
display_name: Sunshine
commands:
  install: {exec: scripts/package-plugin, args: [sunshine, install]}
  status: {exec: scripts/package-plugin, args: [sunshine, status]}
  down: {exec: scripts/package-plugin, args: [sunshine, down]}
supports: {os_families: [ubuntu, windows]}
down: {destructive: true}
env: [EPHEMERAL_DISPLAY_FPS, EPHEMERAL_DISPLAY_RESOLUTION, EPHEMERAL_SUNSHINE_PASSWORD, SUNSHINE_VERSION, SUNSHINE_MAX_BITRATE_KBPS]
actions:
  - id: sunshine
    label: Sunshine
    target: sunshine.open
  - id: pair-moonlight
    label: Pair Moonlight
    target: moonlight.pair
  - id: moonlight
    label: Moonlight
    target: moonlight.open
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/sunshine.sh]
  windows:
    # Sunshine works without ViGEmBus, but Moonlight gamepad input only routes
    # through a kernel-mode driver that requests a reboot.  Stay on the full
    # provisioning path so a "package install" actually delivers a usable
    # Sunshine.
    steps: []
    state_files: []
    fallback: true
