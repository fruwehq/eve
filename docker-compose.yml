services:
  eve:
    image: eve/eve:slim
    tty: true
    stdin_open: true
    volumes:
      - ${HOME}/.eve-data:/data
      # The image currently runs as root; update this mount target if docker/Dockerfile adds a USER directive.
      - ${HOME}/.ssh:/root/.ssh:ro
      # macOS Docker Desktop exposes the agent through a host socket path; keep SSH_AUTH_SOCK exported in the shell that runs docker compose.
      # Linux hosts usually use /run/user/<uid>/ssh-agent sockets; Docker must be allowed to bind-mount that path.
      - ${SSH_AUTH_SOCK:?SSH_AUTH_SOCK must be exported. Run ssh-add -l to verify your agent, then re-run docker compose.}:/ssh-agent
    environment:
      EVE_HOME: /data
      SSH_AUTH_SOCK: /ssh-agent
